VOCAB.forEach((v,i)=>{v.id=i;v.appear=0;v.right=0;v.group='normal';v.lastDate=null;v.lastAnsweredRound=0;});

const LETTERS='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
let addLetter='';
let session=[],idx=0,flipped=false,answered=false,sessionRight=0,sessionDone=0;
let currentRound=0;
let dailyLog={}; // { 'yyyy/mm/dd': { count: N } }

function today(){return new Date().toLocaleDateString('zh-TW');}
// 冷卻期：答對次數越多，需要等更多輪才再出現
// 1次答對 → 冷卻3輪, 2次 → 10輪, 3次以上 → 30輪
function cooldownRounds(v){
  if(v.right<=0) return 0;
  if(v.right===1) return 3;
  if(v.right===2) return 10;
  return 30;
}
function isOnCooldown(v){
  if(!v.lastAnsweredRound) return false;
  return (currentRound - v.lastAnsweredRound) < cooldownRounds(v);
}

function calcWeight(v){
  if(v.group==='hard'||v.group==='mastered') return 0;
  if(v.appear===0) return 3;
  return +Math.min(3, 1+(1-v.right/v.appear)*2).toFixed(2);
}
function highlightWord(ex,word){
  const root=word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return ex.replace(new RegExp('\\b('+root+'\\w*)\\b','gi'),'<span class="hl">$1</span>');
}
function buildSelects(){
  const available=LETTERS.filter(l=>VOCAB.some(v=>v.w[0].toUpperCase()===l));
  const sel=document.getElementById('sel-add');
  available.forEach(l=>{
    const opt=document.createElement('option');
    opt.value=l;opt.textContent=l+' 開頭';
    sel.appendChild(opt);
  });
}
function onSelectLetter(){
  addLetter=document.getElementById('sel-add').value;
  applyFilters();
}
function buildPool(){
  let base=VOCAB.filter(v=>{
    if(v.group==='hard'||v.group==='mastered') return false;
    if(addLetter && v.w[0].toUpperCase()!==addLetter) return false;
    return true;
  });
  if(base.length<20){
    const fill=VOCAB.filter(v=>v.group!=='hard'&&v.group!=='mastered'&&!base.find(b=>b.id===v.id)).sort(()=>Math.random()-.5);
    base=[...base,...fill.slice(0,20-base.length)];
  }
  return base;
}

function pickFromPool(pool, excludeIds, count){
  const TARGET_NEW = 15; // 每輪至少 15 題新字或冷卻中的字
  const avail = pool.filter(v=>!excludeIds.has(v.id));

  // 分成「新字或在冷卻中」和「可重複出現的舊字」
  const freshWords = avail.filter(v => v.appear===0 || isOnCooldown(v));
  const repeatWords = avail.filter(v => v.appear>0 && !isOnCooldown(v));

  const picked = new Set();

  // 先從 freshWords 抽最多 TARGET_NEW 題
  const freshWeighted = [];
  freshWords.forEach(v=>{
    const w = Math.max(1, Math.round(calcWeight(v)));
    for(let i=0;i<w;i++) freshWeighted.push(v);
  });
  let tries=0;
  const freshTarget = Math.min(TARGET_NEW, freshWords.length, count);
  while(picked.size<freshTarget && tries<5000){
    if(freshWeighted.length===0) break;
    picked.add(freshWeighted[Math.floor(Math.random()*freshWeighted.length)].id);
    tries++;
  }
  // 若 freshWords 不足，從 freshWords 全補
  freshWords.forEach(v=>{ if(picked.size<freshTarget) picked.add(v.id); });

  // 剩下名額從 repeatWords 加權抽（最多5題）
  const remaining = count - picked.size;
  if(remaining > 0 && repeatWords.length > 0){
    const repeatWeighted = [];
    repeatWords.forEach(v=>{
      const w = Math.max(1, Math.round(calcWeight(v)));
      for(let i=0;i<w;i++) repeatWeighted.push(v);
    });
    tries=0;
    while(picked.size<count && tries<5000){
      picked.add(repeatWeighted[Math.floor(Math.random()*repeatWeighted.length)].id);
      tries++;
    }
    repeatWords.forEach(v=>{ if(picked.size<count) picked.add(v.id); });
  }

  // 最後若還不足 count，從 avail 補
  avail.forEach(v=>{ if(picked.size<count) picked.add(v.id); });

  return Array.from(picked).map(id=>VOCAB.find(v=>v.id===id)).filter(Boolean);
}
function startSession(fullReset){
  if(fullReset){
    session=[];idx=0;flipped=false;answered=false;sessionRight=0;sessionDone=0;
    currentRound=0;
    document.getElementById('s-done').textContent=0;
    document.getElementById('s-right').textContent=0;
  }
  currentRound++;
  const pool=buildPool();
  const done=session.slice(0,idx);
  const doneIds=new Set(done.map(v=>v.id));
  const cur=(!fullReset&&idx<session.length)?session[idx]:null;
  if(cur) doneIds.add(cur.id);
  const needed=20-(done.length+(cur?1:0));
  const newTail=pickFromPool(pool,doneIds,needed);
  session=cur?[...done,cur,...newTail.sort(()=>Math.random()-.5)]:[...done,...newTail.sort(()=>Math.random()-.5)];
  if(fullReset) idx=0;
  document.getElementById('s-total').textContent=session.length;
  document.getElementById('s-db').textContent=VOCAB.length;
  updateVocabStats();
  if(fullReset){renderMainArea();updateCard();}
  updateVocabStats();updateProg();
}
function applyFilters(){startSession(false);}
function updateProg(){
  const p=document.getElementById('prog');
  if(p) p.style.width=session.length>0?Math.round(idx/session.length*100)+'%':'0%';
}

  document.getElementById('main-area').innerHTML=`

      <span class="card-tag tag-seen" id="card-tag">複習</span>
      <div class="word-en" id="word-en">—</div>

      <div class="word-ex" id="word-ex"></div>
      <div class="word-zh" id="word-zh" style="display:none"></div>
      <div class="word-meta" id="word-meta"></div>
    </div>
    <div class="answer-grid" id="answer-grid" style="display:none">
      <button class="ans-btn ans-wrong" onclick="pick('wrong')"><span class="ans-icon">✕</span><span class="ans-label">答錯</span></button>
      <button class="ans-btn ans-right" onclick="pick('right')"><span class="ans-icon">✓</span><span class="ans-label">答對</span></button>
      <button class="ans-btn ans-hard" onclick="pick('hard')"><span class="ans-icon">✕✕</span><span class="ans-label">極為困難</span></button>
      <button class="ans-btn ans-master" onclick="pick('mastered')"><span class="ans-icon">★</span><span class="ans-label">極為簡單</span></button>
    </div>`;
}
function updateCard(){
  if(idx>=session.length){
    document.getElementById('prog').style.width='100%';
    document.getElementById('main-area').innerHTML=`
      <div class="done-msg">
        <div class="done-big">本輪完成！</div>
        <div class="done-sub">答對 ${sessionRight} / ${sessionDone} 題（${sessionDone>0?Math.round(sessionRight/sessionDone*100):0}%）</div>
        <div style="margin-top:1rem"><button class="btn" onclick="startSession(true)">↺ 再來一輪</button></div>
      </div>`;
    return;
  }
  updateProg();
  const v=session[idx];
  flipped=false;answered=false;
  document.getElementById('word-en').textContent=v.w;
  document.getElementById('word-pos').textContent=v.pos;
  document.getElementById('word-ex').style.display='';
  document.getElementById('word-ex').innerHTML=highlightWord(v.ex,v.w);
  document.getElementById('word-zh').style.display='none';
  document.getElementById('word-zh').textContent=v.zh;
  document.getElementById('answer-grid').style.display='none';
  document.getElementById('word-meta').textContent='';
  const tag=document.getElementById('card-tag');
  if(v.group==='hard'){tag.className='card-tag tag-hard';tag.textContent='極為困難';}
  else if(v.group==='mastered'){tag.className='card-tag tag-mastered';tag.textContent='極為簡單';}
  else if(v.appear===0){tag.className='card-tag tag-new';tag.textContent='新字';}
  else if(v.right/v.appear<0.5){tag.className='card-tag tag-weak';tag.textContent='待加強';}
  else{tag.className='card-tag tag-seen';tag.textContent='複習';}
}
function flipCard(){
  if(flipped||answered||idx>=session.length) return;
  flipped=true;
  const v=session[idx];
  const acc=v.appear>0?Math.round(v.right/v.appear*100)+'%':'初次';
  document.getElementById('word-meta').textContent=`出現 ${v.appear} 次　正確率 ${acc}　權重 ${calcWeight(v).toFixed(1)}`;
  document.getElementById('word-ex').style.display='none';
  document.getElementById('word-zh').style.display='block';
  document.getElementById('answer-grid').style.display='grid';
}
function pick(type){
  if(answered) return;
  answered=true;
  const v=session[idx];
  v.appear++;v.lastDate=today();v.lastAnsweredRound=currentRound;
  if(type==='right'){v.right++;sessionRight++;}
  else if(type==='mastered'){v.right++;sessionRight++;v.group='mastered';}
  else if(type==='hard'){v.group='hard';}
  sessionDone++;
  const td=today();
  if(!dailyLog[td]) dailyLog[td]={count:0};
  dailyLog[td].count++;
  document.getElementById('s-done').textContent=sessionDone;
  document.getElementById('s-right').textContent=sessionRight;
  updateVocabStats();
  applyFilters();
  setTimeout(()=>{idx++;updateCard();},300);
}
function updateVocabStats(){
  const seen=VOCAB.filter(v=>v.appear>0).length;
  const weak=VOCAB.filter(v=>v.appear>0&&(v.right/v.appear)<0.5).length;
  const hard=VOCAB.filter(v=>v.group==='hard').length;
  document.getElementById('vs-total').textContent=VOCAB.length;
  document.getElementById('vs-seen').textContent=seen;
  document.getElementById('vs-weak').textContent=weak;
  document.getElementById('vs-hard').textContent=hard;
}
function _exportCSV(type){
  let header,rows,filename;
  if(type==='all'){
    header='單字,詞性,中文,分類,出現次數,答對次數,錯誤率,最後測驗日';
    rows=VOCAB.map(v=>{
      const err=v.appear>0?Math.round((1-v.right/v.appear)*100)+'%':'—';
      const g=v.group==='hard'?'極為困難':v.group==='mastered'?'極為簡單':'一般';
      return [v.w,v.pos,'"'+v.zh+'"',g,v.appear,v.right,err,v.lastDate||'—'].join(',');
    });
    filename='gept_intermediate_all.csv';
  }else if(type==='hard'){
    header='單字,詞性,中文,出現次數,答對次數,錯誤率,最後測驗日';
    rows=VOCAB.filter(v=>v.group==='hard').map(v=>{
      const err=v.appear>0?Math.round((1-v.right/v.appear)*100)+'%':'—';
      return [v.w,v.pos,'"'+v.zh+'"',v.appear,v.right,err,v.lastDate||'—'].join(',');
    });
    filename='gept_hard.csv';
  }else{
    header='單字,詞性,中文,出現次數,答對次數,最後測驗日';
    rows=VOCAB.filter(v=>v.group==='mastered').map(v=>{
      return [v.w,v.pos,'"'+v.zh+'"',v.appear,v.right,v.lastDate||'—'].join(',');
    });
    filename='gept_mastered.csv';
  }
  if(!rows.length){alert('此分類目前沒有資料');return;}
  const csv='\uFEFF'+[header,...rows].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=filename;a.click();
}
function exportCSV(type){
  if(type!=='log') return _exportCSV(type);
  // 使用記錄
  const dates=Object.keys(dailyLog).sort((a,b)=>b.localeCompare(a));
  if(!dates.length){alert('目前尚無使用記錄');return;}
  let cumulative=0;
  // 先算總累積（由早到晚加總，再倒序顯示）
  const sortedAsc=Object.keys(dailyLog).sort((a,b)=>a.localeCompare(b));
  const cumMap={};
  sortedAsc.forEach(d=>{cumulative+=dailyLog[d].count;cumMap[d]=cumulative;});
  const header='日期,當日題數,累積題數';
  const rows=dates.map(d=>[d,dailyLog[d].count,cumMap[d]].join(','));
  const csv='\uFEFF'+[header,...rows].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='gept_usage_log.csv';a.click();
}

let currentUser = null;
let saveTimer = null;

// Google 登入 / 登出
function handleAuth(){
  if(currentUser){
    auth.signOut();
  } else {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(e=>alert('登入失敗：'+e.message));
  }
}

// 監聽登入狀態
auth.onAuthStateChanged(async user=>{
  currentUser = user;
  const bar  = document.getElementById('login-status');
  const btn  = document.getElementById('login-btn');
  if(user){
    bar.textContent = '已登入：' + user.email;
    btn.textContent = '登出';
    btn.style.color = '#c0392b';
    await loadFromCloud();   // 載入雲端進度
  } else {
    bar.textContent = '尚未登入，進度不會儲存';
    btn.textContent = 'Google 登入';
    btn.style.color = '';
  }
});

// 從 Firestore 載入進度
async function loadFromCloud(){
  if(!currentUser) return;
  try{
    const snap = await db.collection('users').doc(currentUser.uid).collection('vocab').get();
    if(snap.empty){ startSession(true); return; }
    snap.forEach(doc=>{
      const d = doc.data();
      const v = VOCAB.find(x=>x.w===doc.id);
      if(v){
        v.appear = d.appear||0;
        v.right  = d.right||0;
        v.group  = d.group||'normal';
        v.lastDate = d.lastDate||null;
        v.lastAnsweredRound = d.lastAnsweredRound||0;
      }
    });
    // 載入 dailyLog
    const logSnap = await db.collection('users').doc(currentUser.uid).collection('meta').doc('dailyLog').get();
    if(logSnap.exists) dailyLog = logSnap.data()||{};
    // 載入 currentRound
    const metaSnap = await db.collection('users').doc(currentUser.uid).collection('meta').doc('state').get();
    if(metaSnap.exists) currentRound = metaSnap.data().currentRound||0;
    startSession(true);
    updateVocabStats();
  } catch(e){
    console.error('載入失敗',e);
    startSession(true);
  }
}

// 儲存單一單字到 Firestore（防抖：答題後 1.5 秒批次寫入）
const pendingSave = {};
function scheduleSave(v){
  if(!currentUser) return;
  pendingSave[v.w] = v;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(flushSave, 1500);
}
async function flushSave(){
  if(!currentUser || !Object.keys(pendingSave).length) return;
  const batch = db.batch();
  const base  = db.collection('users').doc(currentUser.uid).collection('vocab');
  Object.values(pendingSave).forEach(v=>{
    batch.set(base.doc(v.w),{
      appear: v.appear, right: v.right,
      group: v.group, lastDate: v.lastDate||null,
      lastAnsweredRound: v.lastAnsweredRound||0
    });
  });
  // 同步 dailyLog 和 currentRound
  const metaBase = db.collection('users').doc(currentUser.uid).collection('meta');
  batch.set(metaBase.doc('dailyLog'), dailyLog);
  batch.set(metaBase.doc('state'), {currentRound});
  await batch.commit().catch(e=>console.error('儲存失敗',e));
  Object.keys(pendingSave).forEach(k=>delete pendingSave[k]);
}

// 啟動（未登入時先正常啟動，等登入後重新載入）
startSession(true);

  <button class="btn" onclick="resetAllRecords()" style="color:#c0392b;border-color:#e0b0b0;font-size:13px">

  </button>

<script>
function resetAllRecords(){
  if(!confirm('確定要清空所有學習紀錄嗎？\n\n所有單字的出現次數、答對數、答錯數、分類都會歸零，此操作無法復原。')) return;
  VOCAB.forEach(v=>{
    v.appear=0;v.right=0;v.group='normal';
    v.lastDate=null;v.lastAnsweredRound=0;
  });
  currentRound=0;
  dailyLog={};
  startSession(true);
  updateVocabStats();
  // 清除雲端資料
  if(currentUser){
    const uid = currentUser.uid;
    const vocabRef = db.collection('users').doc(uid).collection('vocab');
    const metaRef  = db.collection('users').doc(uid).collection('meta');
    vocabRef.get().then(snap=>{
      const batch=db.batch();
      snap.forEach(d=>batch.delete(d.ref));
      batch.delete(metaRef.doc('dailyLog'));
      batch.delete(metaRef.doc('state'));
      return batch.commit();
    }).catch(e=>console.error('雲端清除失敗',e));
  }
  alert('已清空所有紀錄，重新開始！');
}
</script>
